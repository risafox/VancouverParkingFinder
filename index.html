<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Van Parking" />
  <meta name="theme-color" content="#ffffff" />
  <title>Vancouver Parking Finder</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Floating header pill -->
    <div id="header">
      <div id="header-left">
        <span id="header-icon">P</span>
        <div id="header-text">
          <div id="header-title">Where to Street Park Vancouver</div>
          <div id="header-subtitle" class="muted">tap price to filter · tap tickets to see where people have gotten ticketed</div>
        </div>
      </div>
      <div id="time-display"></div>
    </div>

    <!-- Horizontal filter chips -->
    <div id="chips-bar">
      <div class="chip active" data-type="price" data-color="green">
        <span class="chip-dot green"></span> ≤$1.50/hr
      </div>
      <div class="chip active" data-type="price" data-color="yellow">
        <span class="chip-dot yellow"></span> ≤$3.00/hr
      </div>
      <div class="chip active" data-type="price" data-color="red">
        <span class="chip-dot red"></span> $3+/hr
      </div>
      <div class="chip" data-type="ticket">
        <span class="chip-dot" style="background:#111"></span> Tickets
      </div>
      <div class="chip" data-type="zones">
        <span class="chip-dot" style="background:#7b61ff"></span> Permit Zones
      </div>
    </div>

    <div id="map"></div>

    <!-- Locate button (floating) -->
    <button id="locate-btn" aria-label="Find my location">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z" stroke-width="0"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </button>

    <!-- Info panel -->
    <div id="info-panel" class="hidden">
      <button id="close-panel">&#x2715;</button>
      <div id="panel-content"></div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
